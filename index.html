<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./recursos/css/general.css">
    <link rel="stylesheet" href="./recursos/css/index.css">
    <link rel="icon" type="image/png" href="./recursos/imagenes/favicon-copa.png">
    <script src="./recursos/js/vistas/menu.js" defer></script>
    <script type="module" src="./recursos/js/controladores/global.js"></script>
    <script type="module" src="./recursos/js/controladores/inicio.js"></script>
    <title>Mini Wine - Inicio</title>
</head>
<body>
    <a href="#contenido-principal" class="saltar-contenido">Saltar al contenido principal</a>
    
    <header class="cabecera">
        <a href="./">
            <img class="cabecera__logotipo" src="./recursos/imagenes/logotipo-miniwine.webp" alt="Logotipo de Mini Wine" width="100px">
        </a>

        <nav class="navegacion" id="navegacion">
            <ul class="navegacion__lista">
                <li class="navegacion__item"><a class="activo" href="./index.html">Inicio</a></li>
                <li class="navegacion__item"><a href="./catalogo.html">Catálogo</a></li>
                <li class="navegacion__item"><a href="./acerca-de-miniwine.html">Acerca de Mini Wine</a></li>
                <li class="navegacion__item"><a href="./contacto.html">Contacto</a></li>
            </ul>
        </nav>

        <button class="navegacion__boton" id="navegacion__boton">
            <img class="navegacion__icono" id="navegacion__icono" src="./recursos/imagenes/icono-menu.svg" alt="Ícono del menú">   
        </button>
        
        <div class="overlay-menu" id="overlay-menu"></div>
    </header>

    <main id="contenido-principal">
        <section class="seccion-introduccion">
            <img class="imagen-fondo" id="hero-img" src="" alt="Copa de vino">
            <p class="seccion-introduccion__parrafo" id="hero-texto"></p>
            <div class="imagen-fondo__overlay"></div>
        </section>

        <div class="contenedor-contenido-principal">
           <section class="seccion-miniwine">
                <h1 class="seccion-miniwine__titulo" id="nosotros-titulo"></h1>
                <p class="seccion-miniwine__parrafo" id="nosotros-parrafo"></p>
            </section>

            <section class="seccion-productos">
                <h2 class="seccion-productos__titulo" id="productos-titulo"></h2>
                <div class="contenedor">
                    <article class="articulo-producto">
                        <img class="articulo-producto__imagen" id="prod1-img" src="" alt="">
                        <div class="producto-informacion producto-informacion--individual">
                            <h3 class="producto-informacion__titulo" id="prod1-titulo"></h3>
                            <p id="prod1-parrafo"></p>
                        </div>
                    </article>
                    <article class="articulo-producto">
                        <img class="articulo-producto__imagen" id="prod2-img" src="" alt="">
                        <div class="producto-informacion producto-informacion--packs">
                            <h3 class="producto-informacion__titulo" id="prod2-titulo"></h3>
                            <p id="prod2-parrafo"></p>
                        </div>
                    </article>
                </div>
                <a href="./catalogo.html" class="boton boton--ver-catalogo">Ver catálogo completo</a>
            </section>

            <section class="seccion-delivery">
                <h2 class="seccion-delivery__titulo" id="delivery-titulo"></h2>
                <div class="seccion-delivery__contenedor">
                    <div class="seccion-delivery__info">
                        <p class="seccion-delivery__texto" id="delivery-texto-barrios"></p>
                        <ul class="seccion-delivery__lista" id="delivery-lista-barrios"></ul>
                        <p class="seccion-delivery__mensaje" id="delivery-texto-otras"></p>
                    </div>
                    <div class="seccion-delivery__mapa">
                        <p class="seccion-delivery__titulo-mapa" id="delivery-texto-mapa"></p>
                        <div class="seccion-delivery__tarjeta-mapa">
                            <iframe id="delivery-mapa" title="Mapa" src="" width="100%" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
                        </div>
                    </div>
                </div>
            </section>

            <section class="seccion-sumar-bodega">
                <h2 class="seccion-sumar-bodega__titulo" id="bodega-titulo"></h2>
                <p class="seccion-sumar-bodega__texto" id="bodega-parrafo"></p>
                <a class="boton--suma-tu-bodega boton" id="bodega-boton" href=""></a>
            </section>
        </div>
    </main>

    <footer class="pie">
       <address class="pie__informacion">
                <a href="./index.html" class="pie__link pie__link--logo">
                    <img src="" alt="Logotipo de Mini Wine" class="pie__logo" id="img-logo-footer">
                </a>
                <div id="contenedor-redes-footer" style="display: contents;"></div>
        </address>
    </footer>
</body>
</html>
