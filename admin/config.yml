backend:
  name: git-gateway
  branch: main 

local_backend: true 

media_folder: "recursos/imagenes/catalogo" 
public_folder: "./recursos/imagenes/catalogo" 

collections:
  # 1. TABLA MAESTRA (El CRUD dinámico que te faltaba)
  - name: "configuracion"
    label: "⚙️ Ajustes de la Tienda"
    delete: false
    files:
      - label: "Listas Desplegables"
        name: "maestros"
        file: "datos/base_datos/listas_maestras.json"
        fields:
          - label: "Bodegas Disponibles"
            name: "bodegas"
            widget: "list"
            summary: "{{fields.nombre}}"
            fields: 
              - {label: "Nombre", name: "nombre", widget: "string"}
          - label: "Tipos de Vino"
            name: "tipos"
            widget: "list"
            summary: "{{fields.nombre}}"
            fields: 
              - {label: "Nombre", name: "nombre", widget: "string"}
          - label: "Presentaciones"
            name: "presentaciones"
            widget: "list"
            summary: "{{fields.nombre}}"
            fields: 
              - {label: "Nombre", name: "nombre", widget: "string"}

  # 2. INVENTARIO (Conectado a la Tabla Maestra)
  - name: "base_datos"
    label: "📦 Inventario"
    files:
      - label: "Catálogo de Productos"
        name: "productos"
        file: "datos/base_datos/catalogo.json" 
        fields:
          - name: "productos" 
            label: "Lista de Productos"
            widget: "list"
            fields:
              - {label: "ID", name: "id", widget: "number", value_type: "int"} 
              - {label: "Nombre del Vino", name: "nombre", widget: "string"} 
              - label: "Bodega"
                name: "bodega"
                widget: "relation"
                collection: "configuracion"
                file: "maestros"
                search_fields: ["bodegas.*.nombre"]
                display_fields: ["bodegas.*.nombre"]
                value_field: "bodegas.*.nombre"
                required: false
              - {label: "Precio", name: "precio", widget: "number", value_type: "float"}
              - label: "Tipo de Vino"
                name: "tipo"
                widget: "relation"
                collection: "configuracion"
                file: "maestros"
                search_fields: ["tipos.*.nombre"]
                display_fields: ["tipos.*.nombre"]
                value_field: "tipos.*.nombre"
                required: false
              - label: "Presentación"
                name: "presentacion"
                widget: "relation"
                collection: "configuracion"
                file: "maestros"
                search_fields: ["presentaciones.*.nombre"]
                display_fields: ["presentaciones.*.nombre"]
                value_field: "presentaciones.*.nombre"
              - name: "imagen"
                label: "Imagen"
                widget: "object"
                fields:
                  - {label: "Archivo", name: "src", widget: "image"}
                  - {label: "Alt", name: "alt", widget: "string"}

  # 3. CONTENIDO WEB
  - name: "contenido_web"
    label: "🌐 Contenido Web"
    files:
      - label: "Globales (Footer)"
        name: "globales"
        file: "datos/contenido_web/globales.json"
        fields:
          - {label: "Logo Footer", name: "logo_footer", widget: "image"}
          - name: "enlaces_contacto"
            label: "Redes Sociales"
            widget: "list"
            fields:
              - {label: "Plataforma", name: "plataforma", widget: "string"}
              - {label: "URL", name: "url", widget: "string"}
              - {label: "Texto", name: "texto", widget: "string"}
              - {label: "Ícono", name: "icono", widget: "image"}

      - label: "Inicio (Home)"
        name: "textos_inicio"
        file: "datos/contenido_web/textos_inicio.json"
        fields:
          - name: "hero"
            label: "Hero"
            widget: "object"
            fields:
              - {label: "Imagen", name: "imagen", widget: "image"}
              - {label: "Texto", name: "texto", widget: "string"}
          - name: "seccion_nosotros"
            label: "Nosotros"
            widget: "object"
            fields:
              - {label: "Título", name: "titulo", widget: "string"}
              - {label: "Párrafo", name: "parrafo", widget: "text"}
          - name: "seccion_productos"
            label: "Productos Destacados"
            widget: "object"
            fields:
              - {label: "Título", name: "titulo", widget: "string"}
              - name: "producto_1"
                label: "Producto 1"
                widget: "object"
                fields:
                  - {label: "Imagen", name: "imagen", widget: "image"}
                  - {label: "Título", name: "titulo", widget: "string"}
                  - {label: "Párrafo", name: "parrafo", widget: "text"}
              - name: "producto_2"
                label: "Producto 2"
                widget: "object"
                fields:
                  - {label: "Imagen", name: "imagen", widget: "image"}
                  - {label: "Título", name: "titulo", widget: "string"}
                  - {label: "Párrafo", name: "parrafo", widget: "text"}
          - name: "seccion_delivery"
            label: "Delivery"
            widget: "object"
            fields:
              - {label: "Título", name: "titulo", widget: "string"}
              - {label: "Texto Barrios", name: "texto_barrios", widget: "string"}
              - label: "Lista Barrios"
                name: "barrios"
                widget: "list"
                field: {label: "Barrio", name: "barrio", widget: "string"}
              - {label: "URL Mapa", name: "url_mapa", widget: "string"}
          - name: "seccion_bodega"
            label: "Sumar Bodega"
            widget: "object"
            fields:
              - {label: "Título", name: "titulo", widget: "string"}
              - {label: "Párrafo", name: "parrafo", widget: "text"}
              - {label: "Texto Botón", name: "texto_boton", widget: "string"}
              - {label: "Enlace Botón", name: "url_boton", widget: "string"}

      - label: "Catálogo (Textos)"
        name: "textos_catalogo"
        file: "datos/contenido_web/textos_catalogo.json"
        fields:
          - {label: "Título", name: "titulo_pagina", widget: "string"}
          - {label: "Aclaración Precios", name: "texto_minorista", widget: "string"}
          - {label: "Enlace Mayorista", name: "enlace_mayorista", widget: "string"}

      - label: "Acerca de"
        name: "textos_acerca_de"
        file: "datos/contenido_web/textos_acerca_de.json"
        fields:
          - name: "seccion_historia"
            label: "Historia"
            widget: "object"
            fields:
              - {label: "Título", name: "titulo", widget: "string"}
              - name: "parrafos"
                label: "Párrafos"
                widget: "list"
                field: {label: "Texto", name: "parrafo", widget: "text"}

      - label: "Contacto"
        name: "textos_contacto"
        file: "datos/contenido_web/textos_contacto.json"
        fields:
          - {label: "Título", name: "titulo_pagina", widget: "string"}
          - {label: "Párrafo", name: "parrafo_principal", widget: "text"}